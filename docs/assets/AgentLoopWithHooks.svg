<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <style>
      text {
        font-family: 'Segoe UI', 'SF Pro', -apple-system, sans-serif;
      }
      .hook-rect { fill: #E6FFFA; stroke: #319795; stroke-width: 1.5; }
      .hook-text { fill: #234E52; font-family: monospace; font-size: 11px; font-weight: 600; }
      .hook-dot { fill: #319795; }
      
      .err-rect { fill: #FFF5F5; stroke: #E53E3E; stroke-width: 1.5; }
      .err-text { fill: #742A2A; font-family: monospace; font-size: 11px; font-weight: 600; }
      .err-dot { fill: #E53E3E; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5B6ABF"/>
    </marker>
    <filter id="shadow" x="-8%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000022"/>
    </filter>
  </defs>

  <rect width="900" height="500" rx="12" fill="#F8F9FC"/>

  <g transform="translate(30, 30)">
    <text x="0" y="0" font-size="13" font-weight="700" fill="#2D3748">Lifecycle Hooks 图例</text>
    <g transform="translate(0, 20)">
      <rect x="0" y="-10" width="90" height="20" rx="10" class="hook-rect"/>
      <circle cx="12" cy="0" r="3" class="hook-dot"/>
      <text x="48" y="0" dy="0.3em" text-anchor="middle" font-size="10" class="hook-text">Normal Flow</text>
    </g>
    <g transform="translate(100, 20)">
      <rect x="0" y="-10" width="85" height="20" rx="10" class="err-rect"/>
      <circle cx="12" cy="0" r="3" class="err-dot"/>
      <text x="46" y="0" dy="0.3em" text-anchor="middle" font-size="10" class="err-text">Error Flow</text>
    </g>
  </g>

  <text x="430" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#2D3748">Agent Loop</text>

  <path d="M 520 110 A 150 150 0 0 1 573 276"
        fill="none" stroke="#5B6ABF" stroke-width="2.5" marker-end="url(#arrowhead)"/>

  <path d="M 538 334 A 150 150 0 0 1 322 334"
        fill="none" stroke="#5B6ABF" stroke-width="2.5" marker-end="url(#arrowhead)"/>

  <path d="M 287 276 A 150 150 0 0 1 340 110"
        fill="none" stroke="#5B6ABF" stroke-width="2.5" marker-end="url(#arrowhead)"/>

  <path d="M 150 280 C 220 280 260 250 282 193" fill="none" stroke="#5B6ABF" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <text x="85" y="285" text-anchor="middle" font-size="12" font-weight="600" fill="#2D3748">UserQuery · LoopStart</text>

  <circle cx="575" cy="193" r="3" fill="#5B6ABF"/> 
  <path d="M 575 193 C 600 250 640 280 710 280" fill="none" stroke="#5B6ABF" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <text x="780" y="278" text-anchor="middle" font-size="12" font-weight="600" fill="#2D3748">ToolCall为空 · LoopEnd</text>
  <text x="780" y="295" text-anchor="middle" font-size="11" fill="#718096">给出最后答案</text>

  <g filter="url(#shadow)">
    <rect x="340" y="52" width="180" height="58" rx="10" fill="#FFFFFF" stroke="#5B6ABF" stroke-width="2"/>
    <text x="430" y="79" text-anchor="middle" font-size="15" font-weight="600" fill="#5B6ABF">LLMRequest</text>
    <text x="430" y="98" text-anchor="middle" font-size="11" fill="#718096">发请求给 · 收Response</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="470" y="276" width="180" height="58" rx="10" fill="#FFFFFF" stroke="#5B6ABF" stroke-width="2"/>
    <text x="560" y="303" text-anchor="middle" font-size="15" font-weight="600" fill="#5B6ABF">ToolExecute</text>
    <text x="560" y="322" text-anchor="middle" font-size="11" fill="#718096">解析 tool_call · 执行工具</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="210" y="276" width="180" height="58" rx="10" fill="#FFFFFF" stroke="#5B6ABF" stroke-width="2"/>
    <text x="300" y="303" text-anchor="middle" font-size="15" font-weight="600" fill="#5B6ABF">AppendMsg</text>
    <text x="300" y="322" text-anchor="middle" font-size="11" fill="#718096">追加消息到 Memory</text>
  </g>

  <text x="430" y="425" text-anchor="middle" font-size="12" fill="#A0AEC0">循环直到没有ToolCall调用</text>

  <g transform="translate(190, 245)">
    <rect x="-53" y="-11" width="106" height="22" rx="11" class="hook-rect"/>
    <circle cx="-41" cy="0" r="3" class="hook-dot"/>
    <text x="3" y="0" dy="0.3em" text-anchor="middle" class="hook-text">on_run_start</text>
  </g>

  <g transform="translate(290, 180)">
    <rect x="-55" y="-11" width="110" height="22" rx="11" class="hook-rect"/>
    <circle cx="-43" cy="0" r="3" class="hook-dot"/>
    <text x="3" y="0" dy="0.3em" text-anchor="middle" class="hook-text">on_step_start</text>
  </g>

  <g transform="translate(325, 125)">
    <rect x="-53" y="-11" width="106" height="22" rx="11" class="hook-rect"/>
    <circle cx="-41" cy="0" r="3" class="hook-dot"/>
    <text x="3" y="0" dy="0.3em" text-anchor="middle" class="hook-text">on_llm_start</text>
  </g>

  <g transform="translate(565, 135)">
    <rect x="-47" y="-11" width="94" height="22" rx="11" class="hook-rect"/>
    <circle cx="-35" cy="0" r="3" class="hook-dot"/>
    <text x="3" y="0" dy="0.3em" text-anchor="middle" class="hook-text">on_llm_end</text>
  </g>

  <g transform="translate(575, 165)">
    <rect x="-53" y="-11" width="106" height="22" rx="11" class="err-rect"/>
    <circle cx="-41" cy="0" r="3" class="err-dot"/>
    <text x="3" y="0" dy="0.3em" text-anchor="middle" class="err-text">on_llm_error</text>
  </g>

  <g transform="translate(585, 235)">
    <rect x="-65" y="-11" width="130" height="22" rx="11" class="hook-rect"/>
    <circle cx="-53" cy="0" r="3" class="hook-dot"/>
    <text x="3" y="0" dy="0.3em" text-anchor="middle" class="hook-text">before_tool_call</text>
  </g>

  <g transform="translate(490, 395)">
    <rect x="-62" y="-11" width="124" height="22" rx="11" class="hook-rect"/>
    <circle cx="-50" cy="0" r="3" class="hook-dot"/>
    <text x="3" y="0" dy="0.3em" text-anchor="middle" class="hook-text">after_tool_call</text>
  </g>

  <g transform="translate(360, 395)">
    <rect x="-59" y="-11" width="118" height="22" rx="11" class="err-rect"/>
    <circle cx="-47" cy="0" r="3" class="err-dot"/>
    <text x="3" y="0" dy="0.3em" text-anchor="middle" class="err-text">on_tool_failed</text>
  </g>

  <g transform="translate(670, 260)">
    <rect x="-55" y="-11" width="110" height="22" rx="11" class="hook-rect"/>
    <circle cx="-43" cy="0" r="3" class="hook-dot"/>
    <text x="3" y="0" dy="0.3em" text-anchor="middle" class="hook-text">on_run_finish</text>
  </g>

</svg>
